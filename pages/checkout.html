<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        body {
            background: #f5f5f5;
        }
        
        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="../assets/images/logo.jpg" width="120" class="rounded-circle">
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item me-4"><a class="nav-link" href="home.html">Trang Chủ</a></li>
                    <li class="nav-item me-4"><a class="nav-link" href="tour.html">Tour</a></li>
                    <li class="nav-item me-4"><a class="nav-link" href="about.html">Giới Thiệu</a></li>
                    <li class="nav-item me-4"><a class="nav-link" href="contact.html">Liên Hệ</a></li>
                    <li class="nav-item me-4"><a class="nav-link" href="news.html">Tin Tức</a></li>
                    <li class="nav-item">
                        <a class="btn" href="search.html"><i class="bi bi-search"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- ALERT -->
        <div id="alertBox"></div>

        <div class="row g-4">

            <!-- FORM -->
            <div class="col-md-6 col-12">
                <div class="box">

                    <h4>Thông tin người đặt</h4>

                    <form id="form" novalidate>

                        <div class="mb-3">
                            <input id="name" class="form-control" placeholder="Họ và tên">
                            <div class="invalid-feedback" id="errName"></div>
                        </div>

                        <div class="mb-3">
                            <input id="phone" class="form-control" placeholder="SĐT">
                            <div class="invalid-feedback" id="errPhone"></div>
                        </div>

                        <div class="mb-3">
                            <input id="email" class="form-control" placeholder="Email">
                            <div class="invalid-feedback" id="errEmail"></div>
                        </div>

                        <div class="mb-3">
                            <textarea id="address" class="form-control" placeholder="Địa chỉ"></textarea>
                        </div>

                        <select id="payment" class="form-control mb-3">
<option>Tiền mặt</option>
<option>Chuyển khoản</option>
<option>Momo</option>
</select>

                        <button class="btn btn-success w-100">Xác nhận đặt tour</button>

                    </form>
                </div>
            </div>

            <!-- CART -->
            <div class="col-md-6 col-12">
                <div class="box">
                    <h4>Đơn hàng</h4>
                    <div id="cart"></div>
                    <hr>
                    <h5>Tổng: <span id="total" class="text-danger">0đ</span></h5>
                </div>
            </div>

        </div>
    </div>

    <!-- TOAST -->
    <div class="toast position-fixed top-0 end-0 m-3" id="toast">
        <div class="toast-body text-white" id="toastMsg"></div>
    </div>

    <script>
        // ===== ALERT =====
        function showAlert(msg, type = "danger") {
            document.getElementById("alertBox").innerHTML = `
<div class="alert alert-${type} alert-dismissible fade show">
${msg}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>`;
        }

        // ===== TOAST =====
        function showToast(msg, success = false) {
            let toastEl = document.getElementById("toast");
            let msgEl = document.getElementById("toastMsg");

            msgEl.innerText = msg;
            toastEl.classList.remove("bg-danger", "bg-success");
            toastEl.classList.add(success ? "bg-success" : "bg-danger");

            new bootstrap.Toast(toastEl).show();
        }

        // ===== ERROR =====
        function showError(input, id, msg) {
            input.classList.add("is-invalid");
            document.getElementById(id).innerText = msg;
        }

        // ===== AUTO VIẾT HOA =====
        document.getElementById("name").addEventListener("input", function() {
            this.value = this.value.toUpperCase();
        });

        // ===== LOAD CART =====
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let total = 0;
        let html = "";

        if (cart.length === 0) {
            html = `<p class="text-muted">🛒 Giỏ hàng trống</p>`;
        } else {
            cart.forEach(item => {
                total += item.price;

                html += `
<div class="d-flex align-items-center mb-3 border-bottom pb-2">

    <img src="${item.image}" 
         width="90" height="70"
         style="object-fit: cover; border-radius: 8px; margin-right: 10px;">

    <div class="flex-grow-1">
        <div><b>${item.name}</b></div>
        <small class="text-danger">
            ${item.price.toLocaleString()}đ
        </small>
    </div>

</div>`;
            }); // ✅ ĐÓNG ĐÚNG CHỖ
        }

        document.getElementById("cart").innerHTML = html;
        document.getElementById("total").innerText = total.toLocaleString() + "đ";
        // ===== VALIDATE =====
        document.getElementById("form").onsubmit = function(e) {
            e.preventDefault();

            let name = document.getElementById("name");
            let phone = document.getElementById("phone");
            let email = document.getElementById("email");

            let isValid = true;

            // reset
            [name, phone, email].forEach(i => i.classList.remove("is-invalid"));
            document.getElementById("errName").innerText = "";
            document.getElementById("errPhone").innerText = "";
            document.getElementById("errEmail").innerText = "";

            // NAME
            if (name.value.trim() === "") {
                showError(name, "errName", "❌ Vui lòng nhập họ tên");
                isValid = false;
            } else if (name.value.length <= 7) {
                showError(name, "errName", "❌ Họ tên phải > 7 ký tự");
                isValid = false;
            }

            // PHONE
            if (!/^[0-9]{9}$/.test(phone.value)) {
                showError(phone, "errPhone", "❌ SĐT phải đúng 9 số");
                isValid = false;
            }

            // EMAIL
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                showError(email, "errEmail", "❌ Email không hợp lệ");
                isValid = false;
            }

            // lỗi
            if (!isValid) {
                showAlert("❌ Vui lòng kiểm tra lại thông tin!");
                showToast("Sai thông tin!");
                document.querySelector(".is-invalid") && document.querySelector(".is-invalid").focus();
                return;
            }

            // cart rỗng
            if (cart.length === 0) {
                showAlert("❌ Giỏ hàng trống!");
                showToast("Không có sản phẩm!");
                return;
            }

            // success
            if (confirm("Xác nhận đặt tour?")) {
                localStorage.removeItem("cart");
                showAlert("✅ Đặt tour thành công!", "success");
                showToast("Đặt thành công!", true);
                document.getElementById("form").reset();
            }

        }
    </script>

</body>

</html>
